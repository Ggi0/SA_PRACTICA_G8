- name: Base + node_exporter en todas las instancias
  hosts: all
  become: true
  vars:
    ne_ver: "{{ node_exporter_version }}"
  tasks:
    - name: Actualizar apt
      apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Crear usuario de sistema node_exporter
      user:
        name: node_exporter
        system: true
        shell: /usr/sbin/nologin
        create_home: false

    - name: Descargar node_exporter
      get_url:
        url: "https://github.com/prometheus/node_exporter/releases/download/v{{ ne_ver }}/node_exporter-{{ ne_ver }}.linux-amd64.tar.gz"
        dest: "/tmp/node_exporter.tar.gz"

    - name: Extraer node_exporter
      unarchive:
        src: "/tmp/node_exporter.tar.gz"
        dest: "/tmp"
        remote_src: true

    - name: Instalar binario
      copy:
        src: "/tmp/node_exporter-{{ ne_ver }}.linux-amd64/node_exporter"
        dest: "/usr/local/bin/node_exporter"
        mode: "0755"
        remote_src: true

    - name: Crear servicio systemd
      copy:
        dest: /etc/systemd/system/node_exporter.service
        content: |
          [Unit]
          Description=Prometheus Node Exporter
          After=network.target
          [Service]
          User=node_exporter
          ExecStart=/usr/local/bin/node_exporter
          Restart=always
          [Install]
          WantedBy=multi-user.target

    - name: Habilitar y arrancar node_exporter
      systemd:
        name: node_exporter
        enabled: true
        state: started
        daemon_reload: true
