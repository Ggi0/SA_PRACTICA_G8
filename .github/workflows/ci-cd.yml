name: CI/CD Pipeline - FilmStars

on:
  pull_request:
    branches: [develop, release]
  push:
    branches: [develop, release]

jobs:
  ci-tests:
    name: "CI - Build & Tests [${{ matrix.service }}]"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DB_PASS: ci-db-password
      JWT_SECRET: ci-jwt-secret
      RABBITMQ_PASS: ci-rabbitmq-password
      DEFAULT_ADMIN_PASSWORD: ci-admin-password
    strategy:
      fail-fast: true
      matrix:
        service:
          - api-gateway
          - users-service
          - movies-service
          - reservas-service
          - payments-service
    defaults:
      run:
        working-directory: Fase3/FilmStars/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci || npm install

      - name: Build
        run: npm run build

      - name: Run tests with coverage when available
        run: |
          if node -e "const p=require('./package.json'); process.exit(p.scripts && p.scripts['test:cov'] ? 0 : 1)"; then
            npm run test:cov
          else
            echo "No test:cov script in ${{ matrix.service }}; build gate already passed."
          fi

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-${{ matrix.service }}
          path: Fase3/FilmStars/${{ matrix.service }}/coverage/
          if-no-files-found: ignore

  provision-infra:
    name: "Infra - Terraform + Ansible"
    runs-on: ubuntu-latest
    needs: [ci-tests]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/release')
    defaults:
      run:
        working-directory: infra
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: us-east-2
    outputs:
      develop_host: ${{ steps.tfoutputs.outputs.develop_host }}
      zot_host: ${{ steps.tfoutputs.outputs.zot_host }}
      k3s_ip: ${{ steps.tfoutputs.outputs.k3s_ip }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - name: Restore SSH keys for Terraform and Ansible
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PUBLIC_KEY }}"  > ~/.ssh/filmstars_deploy.pub
          echo "${{ secrets.DEVELOP_SSH_KEY }}" > ~/.ssh/filmstars_deploy
          chmod 600 ~/.ssh/filmstars_deploy

      - name: Terraform init
        run: terraform -chdir=terraform init -input=false

      - name: Terraform plan
        id: tfplan
        run: |
          set +e
          terraform -chdir=terraform plan -input=false -detailed-exitcode -out=tfplan -var="admin_cidr=0.0.0.0/0"
          status=$?
          set -e

          if [ "$status" -eq 0 ]; then
            echo "changes=false" >> "$GITHUB_OUTPUT"
            echo "Terraform no detecto cambios de infraestructura."
          elif [ "$status" -eq 2 ]; then
            echo "changes=true" >> "$GITHUB_OUTPUT"
            echo "Terraform detecto cambios de infraestructura."
          else
            exit "$status"
          fi

      - name: Terraform apply when infrastructure changed
        if: steps.tfplan.outputs.changes == 'true'
        run: terraform -chdir=terraform apply -input=false tfplan

      - name: Skip Terraform apply without changes
        if: steps.tfplan.outputs.changes == 'false'
        run: echo "Sin diferencias en infraestructura; Terraform apply no se ejecuta."

      - name: Generate Ansible inventory from Terraform
        run: terraform -chdir=terraform output -raw ansible_inventory > ansible/inventory.ini

      - name: Wait for EC2 instance status checks
        run: |
          instance_ids=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=filmstars-k3s,filmstars-registry,filmstars-develop" "Name=instance-state-name,Values=pending,running" \
            --query 'Reservations[].Instances[].InstanceId' \
            --output text)
          test -n "$instance_ids" || { echo "::error::No FilmStars EC2 instances found"; exit 1; }
          aws ec2 wait instance-status-ok --instance-ids $instance_ids

      - name: Check SSH port reachability
        run: |
          echo "Ansible inventory:"
          cat ansible/inventory.ini
          echo "EC2 network details:"
          aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=filmstars-k3s,filmstars-registry,filmstars-develop" "Name=instance-state-name,Values=running" \
            --query 'Reservations[].Instances[].{Name:Tags[?Key==`Name`]|[0].Value,InstanceId:InstanceId,PublicIp:PublicIpAddress,PrivateIp:PrivateIpAddress,SecurityGroups:SecurityGroups[].GroupName}' \
            --output table
          echo "SSH security group rules:"
          aws ec2 describe-security-groups \
            --filters "Name=group-name,Values=filmstars-k3s-sg,filmstars-registry-sg,filmstars-develop-sg" \
            --query 'SecurityGroups[].{GroupName:GroupName,Ingress:IpPermissions[?FromPort==`22` && ToPort==`22`].IpRanges[].CidrIp}' \
            --output table
          awk '/^[0-9]/{print $1}' ansible/inventory.ini | while read -r host; do
            echo "Checking SSH on $host:22"
            timeout 10 bash -c "</dev/tcp/$host/22" || { echo "::error::SSH port 22 is not reachable on $host"; exit 1; }
          done

      - name: Ansible idempotent server configuration
        run: |
          sudo apt-get update && sudo apt-get install -y ansible
          ansible-galaxy collection install community.docker community.general
          cd ansible
          mkdir -p artifacts group_vars
          cat > group_vars/all.yml <<EOF
          zot_user: "${{ secrets.ZOT_USER }}"
          zot_password: "${{ secrets.ZOT_PASSWORD }}"
          node_exporter_version: "1.8.2"
          zot_host_public: "{{ hostvars[groups['registry'][0]]['inventory_hostname'] }}:5000"
          zot_host_private: "{{ hostvars[groups['registry'][0]]['private_ip'] }}:5000"
          EOF
          ANSIBLE_HOST_KEY_CHECKING=False ansible all -i inventory.ini -m wait_for_connection -a "timeout=600" \
            --private-key ~/.ssh/filmstars_deploy
          ANSIBLE_HOST_KEY_CHECKING=False ansible-playbook -i inventory.ini \
            --private-key ~/.ssh/filmstars_deploy site.yml

      - name: Export Terraform and Ansible outputs
        id: tfoutputs
        run: |
          echo "develop_host=$(terraform -chdir=terraform output -raw DEVELOP_HOST)" >> "$GITHUB_OUTPUT"
          echo "zot_host=$(terraform -chdir=terraform output -raw ZOT_HOST)" >> "$GITHUB_OUTPUT"
          echo "k3s_ip=$(terraform -chdir=terraform output -raw K3S_IP)" >> "$GITHUB_OUTPUT"

      - name: Upload kubeconfig generated by Ansible
        uses: actions/upload-artifact@v4
        with:
          name: k3s-kubeconfig
          path: infra/ansible/artifacts/k3s-kubeconfig.yaml
          if-no-files-found: error
          retention-days: 1

  build-push-dockerhub-develop:
    name: "Develop - Build & Push DockerHub"
    runs-on: ubuntu-latest
    needs: [provision-infra]
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    env:
      DEVELOP_HOST: ${{ needs.provision-infra.outputs.develop_host }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate develop configuration
        run: |
          test -n "$DEVELOP_HOST" || { echo "::error::Missing develop host from Terraform outputs"; exit 1; }

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set image tag
        id: meta
        run: echo "tag=develop-${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Build & Push reservas-service
        uses: docker/build-push-action@v5
        with:
          context: Fase3/FilmStars/reservas-service
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/filmstars-reservas-service:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/filmstars-reservas-service:${{ steps.meta.outputs.tag }}

      - name: Build & Push payments-service
        uses: docker/build-push-action@v5
        with:
          context: Fase3/FilmStars/payments-service
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/filmstars-payments-service:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/filmstars-payments-service:${{ steps.meta.outputs.tag }}

      - name: Build & Push users-service
        uses: docker/build-push-action@v5
        with:
          context: Fase3/FilmStars/users-service
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/filmstars-users-service:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/filmstars-users-service:${{ steps.meta.outputs.tag }}

      - name: Build & Push movies-service
        uses: docker/build-push-action@v5
        with:
          context: Fase3/FilmStars/movies-service
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/filmstars-movies-service:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/filmstars-movies-service:${{ steps.meta.outputs.tag }}

      - name: Build & Push api-gateway
        uses: docker/build-push-action@v5
        with:
          context: Fase3/FilmStars/api-gateway
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/filmstars-api-gateway:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/filmstars-api-gateway:${{ steps.meta.outputs.tag }}

      - name: Build & Push frontend
        uses: docker/build-push-action@v5
        with:
          context: Fase3/client
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/filmstars-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/filmstars-frontend:${{ steps.meta.outputs.tag }}
          build-args: |
            VITE_API_URL=http://${{ env.DEVELOP_HOST }}:8080

  deploy-develop:
    name: "Develop - Deploy Docker Compose on VM"
    runs-on: ubuntu-latest
    needs: [provision-infra, build-push-dockerhub-develop]
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    env:
      DEVELOP_HOST: ${{ needs.provision-infra.outputs.develop_host }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate develop deploy secrets
        env:
          DEVELOP_SSH_KEY: ${{ secrets.DEVELOP_SSH_KEY }}
        run: |
          test -n "$DEVELOP_HOST" || { echo "::error::Missing develop host from Terraform outputs"; exit 1; }
          test -n "$DEVELOP_SSH_KEY" || { echo "::error::Missing GitHub secret DEVELOP_SSH_KEY"; exit 1; }

      - name: Copy compose files to develop VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.DEVELOP_HOST }}
          username: ubuntu
          key: ${{ secrets.DEVELOP_SSH_KEY }}
          source: "Fase3/FilmStars/docker-compose.prod.yml,Fase3/FilmStars/database,Fase3/FilmStars/rabbitmq"
          target: ~/filmstars/
          strip_components: 2

      - name: Pull and restart compose stack
        uses: appleboy/ssh-action@v1.0.3
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DB_PASS: ${{ secrets.DB_PASS }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          RABBITMQ_PASS: ${{ secrets.RABBITMQ_PASS }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        with:
          host: ${{ env.DEVELOP_HOST }}
          username: ubuntu
          key: ${{ secrets.DEVELOP_SSH_KEY }}
          envs: DOCKERHUB_USERNAME,DB_PASS,JWT_SECRET,RABBITMQ_PASS,ADMIN_PASSWORD
          script: |
            cd ~/filmstars
            test -n "$DB_PASS" || { echo "Missing DB_PASS"; exit 1; }
            test -n "$JWT_SECRET" || { echo "Missing JWT_SECRET"; exit 1; }
            test -n "$RABBITMQ_PASS" || { echo "Missing RABBITMQ_PASS"; exit 1; }
            test -n "$ADMIN_PASSWORD" || { echo "Missing ADMIN_PASSWORD"; exit 1; }
            echo "DOCKERHUB_USERNAME=$DOCKERHUB_USERNAME" > .env
            printf 'RABBITMQ_PASS=%s\n' "$RABBITMQ_PASS" >> .env
            mkdir -p secrets
            chmod 700 secrets
            printf '%s' "$DB_PASS" > secrets/db_password.txt
            printf '%s' "$JWT_SECRET" > secrets/jwt_secret.txt
            printf '%s' "$RABBITMQ_PASS" > secrets/rabbitmq_password.txt
            printf '%s' "$ADMIN_PASSWORD" > secrets/admin_password.txt
            chmod 600 secrets/*.txt
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f
            sleep 10
            docker exec filmstars-rabbitmq rabbitmqctl add_user admin "$RABBITMQ_PASS" 2>/dev/null || \
              docker exec filmstars-rabbitmq rabbitmqctl change_password admin "$RABBITMQ_PASS"
            docker exec filmstars-rabbitmq rabbitmqctl set_user_tags admin administrator
            docker exec filmstars-rabbitmq rabbitmqctl set_permissions -p / admin ".*" ".*" ".*"

  build-push-zot-release:
    name: "Release - Build & Push Zot"
    runs-on: ubuntu-latest
    needs: [provision-infra]
    if: github.ref == 'refs/heads/release' && github.event_name == 'push'
    env:
      TAG: release-${{ github.run_number }}
      ZOT_HOST: ${{ needs.provision-infra.outputs.zot_host }}
      ZOT_USER: ${{ secrets.ZOT_USER }}
      ZOT_PASSWORD: ${{ secrets.ZOT_PASSWORD }}
      REG: ${{ needs.provision-infra.outputs.zot_host }}/filmstars
      DOCKER_BUILDKIT: 0
    steps:
      - uses: actions/checkout@v4

      - name: Validate Zot configuration
        run: |
          test -n "$ZOT_HOST" || { echo "::error::Missing Zot host from Terraform outputs"; exit 1; }
          test -n "$ZOT_USER" || { echo "::error::Missing GitHub secret ZOT_USER"; exit 1; }
          test -n "$ZOT_PASSWORD" || { echo "::error::Missing GitHub secret ZOT_PASSWORD"; exit 1; }

      - name: Install Skopeo
        run: |
          sudo apt-get update
          sudo apt-get install -y skopeo

      - name: Allow insecure Zot registry on runner
        run: |
          echo '{"insecure-registries":["'"$ZOT_HOST"'"]}' | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker

      - name: Login to Zot
        run: echo "$ZOT_PASSWORD" | docker login "$ZOT_HOST" -u "$ZOT_USER" --password-stdin

      - name: Build and push backend images
        run: |
          push_image() {
            image="$1"
            context="$2"

            docker build -t "$REG/$image:$TAG" -t "$REG/$image:latest" "$context"
            skopeo copy --format oci --dest-tls-verify=false --dest-creds "$ZOT_USER:$ZOT_PASSWORD" "docker-daemon:$REG/$image:$TAG" "docker://$REG/$image:$TAG"
            skopeo copy --format oci --dest-tls-verify=false --dest-creds "$ZOT_USER:$ZOT_PASSWORD" "docker-daemon:$REG/$image:latest" "docker://$REG/$image:latest"
          }

          push_image users-service Fase3/FilmStars/users-service
          push_image movies-service Fase3/FilmStars/movies-service
          push_image reservations-service Fase3/FilmStars/reservas-service
          push_image payments-service Fase3/FilmStars/payments-service
          push_image api-gateway Fase3/FilmStars/api-gateway

      - name: Build and push frontend image
        run: |
          push_image() {
            image="$1"
            context="$2"

            docker build -t "$REG/$image:$TAG" -t "$REG/$image:latest" "$context"
            skopeo copy --format oci --dest-tls-verify=false --dest-creds "$ZOT_USER:$ZOT_PASSWORD" "docker-daemon:$REG/$image:$TAG" "docker://$REG/$image:$TAG"
            skopeo copy --format oci --dest-tls-verify=false --dest-creds "$ZOT_USER:$ZOT_PASSWORD" "docker-daemon:$REG/$image:latest" "docker://$REG/$image:latest"
          }

          push_image frontend Fase3/client

  deploy-k3s-release:
    name: "Release - Deploy K3s on AWS"
    runs-on: ubuntu-latest
    needs: [provision-infra, build-push-zot-release]
    if: github.ref == 'refs/heads/release' && github.event_name == 'push'
    env:
      NS: filmstars
      TAG: release-${{ github.run_number }}
      ZOT_HOST: ${{ needs.provision-infra.outputs.zot_host }}
      K3S_IP: ${{ needs.provision-infra.outputs.k3s_ip }}
      DB_PASS: ${{ secrets.DB_PASS }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      RABBITMQ_PASS: ${{ secrets.RABBITMQ_PASS }}
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-kubectl@v4

      - name: Download kubeconfig generated by Ansible
        uses: actions/download-artifact@v4
        with:
          name: k3s-kubeconfig
          path: kubeconfig-artifact

      - name: Install envsubst
        run: sudo apt-get update && sudo apt-get install -y gettext-base

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          cp kubeconfig-artifact/k3s-kubeconfig.yaml ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Validate Kubernetes API access
        run: |
          server="$(kubectl config view --minify -o jsonpath='{.clusters[0].cluster.server}')"
          echo "Using Kubernetes API: $server"
          if ! kubectl --request-timeout=15s get --raw=/readyz >/dev/null; then
            echo "::error::Cannot reach the Kubernetes API with the kubeconfig generated by Ansible."
            exit 1
          fi

      - name: Apply namespace
        run: kubectl apply -f Fase3/FilmStars/k3s/namespace.yaml

      - name: Validate release runtime secrets
        run: |
          test -n "$DB_PASS" || { echo "::error::Missing GitHub secret DB_PASS"; exit 1; }
          test -n "$JWT_SECRET" || { echo "::error::Missing GitHub secret JWT_SECRET"; exit 1; }
          test -n "$RABBITMQ_PASS" || { echo "::error::Missing GitHub secret RABBITMQ_PASS"; exit 1; }
          test -n "$ADMIN_PASSWORD" || { echo "::error::Missing GitHub secret ADMIN_PASSWORD"; exit 1; }

      - name: Create Kubernetes Secret from GitHub Secrets
        run: |
          kubectl -n $NS create secret generic filmstars-secrets \
            --from-literal=DB_PASS="$DB_PASS" \
            --from-literal=JWT_SECRET="$JWT_SECRET" \
            --from-literal=RABBITMQ_PASS="$RABBITMQ_PASS" \
            --from-literal=DEFAULT_ADMIN_PASSWORD="$ADMIN_PASSWORD" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Create init SQL ConfigMaps
        working-directory: Fase3/FilmStars
        run: |
          kubectl -n $NS create configmap users-initsql \
            --from-file=init.sql=database/sql/users/init.sql \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl -n $NS create configmap movies-initsql \
            --from-file=init.sql=database/sql/movies/init.sql \
            --from-file=seed.sql=database/sql/movies/seed.sql \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl -n $NS create configmap reservations-initsql \
            --from-file=init.sql=database/sql/reservations/init.sql \
            --from-file=seed.sql=database/sql/reservations/seed.sql \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl -n $NS create configmap payments-initsql \
            --from-file=init.sql=database/sql/payments/init.sql \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Create RabbitMQ ConfigMaps
        working-directory: Fase3/FilmStars
        run: |
          kubectl -n $NS create configmap rabbitmq-definitions \
            --from-file=definitions.json=rabbitmq/definitions.json \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl -n $NS create configmap rabbitmq-config \
            --from-file=rabbitmq.conf=rabbitmq/rabbitmq.conf \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply ConfigMaps, databases and RabbitMQ
        run: |
          kubectl apply -f Fase3/FilmStars/k3s/configmaps.yaml
          kubectl apply -f Fase3/FilmStars/k3s/databases.yaml
          for d in db-users db-movies db-reservations db-payments; do
            kubectl -n $NS rollout status deployment/$d --timeout=300s
          done

          kubectl apply -f Fase3/FilmStars/k3s/rabbitmq.yaml
          if ! kubectl -n $NS rollout status deployment/rabbitmq --timeout=300s; then
            kubectl -n $NS get pods -o wide
            kubectl describe nodes
            kubectl -n $NS describe pod -l app=rabbitmq
            exit 1
          fi

      - name: Reconcile RabbitMQ credentials
        run: |
          kubectl -n $NS exec deployment/rabbitmq -- rabbitmqctl add_user admin "$RABBITMQ_PASS" 2>/dev/null || \
            kubectl -n $NS exec deployment/rabbitmq -- rabbitmqctl change_password admin "$RABBITMQ_PASS"
          kubectl -n $NS exec deployment/rabbitmq -- rabbitmqctl set_user_tags admin administrator
          kubectl -n $NS exec deployment/rabbitmq -- rabbitmqctl set_permissions -p / admin ".*" ".*" ".*"

      - name: Apply applications and Ingress
        run: |
          envsubst '${ZOT_HOST} ${TAG}' < Fase3/FilmStars/k3s/apps.yaml | kubectl apply -f -
          envsubst '${K3S_IP}' < Fase3/FilmStars/k3s/ingress.yaml | kubectl apply -f -

      - name: Wait rollout and rollback automatically on failure
        run: |
          set -e
          for d in users-service movies-service reservations-service payments-service api-gateway frontend; do
            if ! kubectl -n $NS rollout status deployment/$d --timeout=180s; then
              echo "::error::deployment/$d failed, rolling back"
              kubectl -n $NS rollout undo deployment/$d || true
              kubectl -n $NS rollout status deployment/$d --timeout=120s || true
              exit 1
            fi
          done

      - name: Show cluster status
        if: always()
        run: |
          if ! kubectl --request-timeout=5s get --raw=/readyz >/dev/null 2>&1; then
            echo "Kubernetes API is unreachable; skipping cluster diagnostics."
            exit 0
          fi

          kubectl --request-timeout=10s -n $NS get pods,svc,ingress || true
          kubectl -n $NS describe pods | sed -n '/Events:/,$p' | tail -120 || true
          kubectl -n $NS logs deployment/reservations-service --tail=80 || true
          kubectl -n $NS logs deployment/payments-service --tail=80 || true
