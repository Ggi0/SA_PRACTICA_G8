name: CI/CD Pipeline - FilmStars

on:
  pull_request:
    branches: [develop, release]
  push:
    branches: [develop, release]

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # FASE 1: CI — Pruebas Unitarias con gate de 75% de cobertura
  # Matriz paralela: si un servicio falla, se cancela todo (fail-fast)
  # ─────────────────────────────────────────────────────────────────────────────
  ci-tests:
    name: "CI - Tests [${{ matrix.service }}]"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        service: [reservas-service, payments-service, users-service, movies-service]

    defaults:
      run:
        working-directory: Fase3/FilmStars/${{ matrix.service }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Run unit tests with coverage (threshold >= 75%)
        run: npm run test:cov

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-${{ matrix.service }}
          path: Fase3/FilmStars/${{ matrix.service }}/coverage/

  # ─────────────────────────────────────────────────────────────────────────────
  # FASE 2: Build & Push — Construcción de imágenes y push a DockerHub
  # Solo se ejecuta si TODOS los tests pasan y es un push directo (no PR)
  # Se ejecuta tanto en develop como en release
  # ─────────────────────────────────────────────────────────────────────────────
  cd-docker:
    name: "CD - Build & Push Images to DockerHub"
    runs-on: ubuntu-latest
    needs: [ci-tests]
    if: github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set release tag
        id: meta
        run: |
          if [ "${{ github.ref_name }}" = "release" ]; then
            echo "tag=release-${{ github.run_number }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.ref_name }}-${{ github.run_number }}" >> $GITHUB_OUTPUT
          fi

      - name: Build & Push reservas-service
        uses: docker/build-push-action@v5
        with:
          context: Fase3/FilmStars/reservas-service
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/filmstars-reservas-service:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/filmstars-reservas-service:${{ steps.meta.outputs.tag }}

      - name: Build & Push payments-service
        uses: docker/build-push-action@v5
        with:
          context: Fase3/FilmStars/payments-service
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/filmstars-payments-service:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/filmstars-payments-service:${{ steps.meta.outputs.tag }}

      - name: Build & Push users-service
        uses: docker/build-push-action@v5
        with:
          context: Fase3/FilmStars/users-service
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/filmstars-users-service:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/filmstars-users-service:${{ steps.meta.outputs.tag }}

      - name: Build & Push movies-service
        uses: docker/build-push-action@v5
        with:
          context: Fase3/FilmStars/movies-service
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/filmstars-movies-service:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/filmstars-movies-service:${{ steps.meta.outputs.tag }}

      - name: Build & Push api-gateway
        uses: docker/build-push-action@v5
        with:
          context: Fase3/FilmStars/api-gateway
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/filmstars-api-gateway:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/filmstars-api-gateway:${{ steps.meta.outputs.tag }}

      - name: Build & Push frontend
        uses: docker/build-push-action@v5
        with:
          context: Fase3/client
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/filmstars-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/filmstars-frontend:${{ steps.meta.outputs.tag }}
          build-args: |
            VITE_API_URL=http://${{ secrets.AWS_EC2_HOST }}:8080

  # ─────────────────────────────────────────────────────────────────────────────
  # FASE 3A: CD — Deploy en máquina local del grupo (rama develop)
  # Usa runner self-hosted instalado en la computadora del integrante.
  # Restricción: SOLO hace pull de imágenes desde DockerHub, nunca build local.
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-local:
    name: "CD - Deploy to Local Machine (develop)"
    runs-on: self-hosted
    needs: [cd-docker]
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare SQL init files
        run: |
          mkdir -p Fase3/FilmStars/database/sql/reservations
          cp -n Fase3/FilmStars/reservas-service/src/docker/init.sql Fase3/FilmStars/database/sql/reservations/init.sql 2>/dev/null || true
          cp -n Fase3/FilmStars/reservas-service/src/docker/seed.sql Fase3/FilmStars/database/sql/reservations/seed.sql 2>/dev/null || true

      - name: Write environment file
        working-directory: Fase3/FilmStars
        run: |
          echo "DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}" > .env
          echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env

      - name: Pull latest images from DockerHub
        working-directory: Fase3/FilmStars
        run: docker compose -f docker-compose.prod.yml pull

      - name: Start services with Docker Compose
        working-directory: Fase3/FilmStars
        run: docker compose -f docker-compose.prod.yml up -d --remove-orphans

      - name: Clean up unused images
        run: docker image prune -f

  # ─────────────────────────────────────────────────────────────────────────────
  # FASE 3B: CD — Deploy en AWS EC2 (rama release)
  # Se conecta por SSH, descarga las imágenes nuevas y reinicia los contenedores.
  # Restricción: docker-compose.prod.yml usa solo image: (sin build: .)
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-aws:
    name: "CD - Deploy to AWS EC2 (release)"
    runs-on: ubuntu-latest
    needs: [cd-docker]
    if: github.ref == 'refs/heads/release' && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy deployment files to AWS EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.AWS_EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.AWS_SSH_KEY }}
          source: "Fase3/FilmStars/docker-compose.prod.yml,Fase3/FilmStars/database,Fase3/FilmStars/rabbitmq,Fase3/FilmStars/reservas-service/src/docker"
          target: ~/filmstars/
          strip_components: 2

      - name: Execute deployment on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AWS_EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.AWS_SSH_KEY }}
          script: |
            cd ~/filmstars
            mkdir -p database/sql/reservations
            cp -n reservas-service/src/docker/init.sql database/sql/reservations/init.sql 2>/dev/null || true
            cp -n reservas-service/src/docker/seed.sql database/sql/reservations/seed.sql 2>/dev/null || true
            echo "DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}" > .env
            echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f
