apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: db-users-pvc
  namespace: filmstars
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: db-users
  namespace: filmstars
spec:
  replicas: 1
  selector:
    matchLabels:
      app: db-users
  template:
    metadata:
      labels:
        app: db-users
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          env:
            - name: POSTGRES_DB
              value: filmstars_users
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: filmstars-secrets
                  key: DB_PASS
          ports:
            - containerPort: 5432
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres", "-d", "filmstars_users"]
            initialDelaySeconds: 10
            periodSeconds: 5
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: initsql
              mountPath: /docker-entrypoint-initdb.d
          resources:
            requests: { memory: "192Mi" }
            limits: { cpu: "500m", memory: "512Mi" }
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: db-users-pvc
        - name: initsql
          configMap:
            name: users-initsql
---
apiVersion: v1
kind: Service
metadata:
  name: db-users
  namespace: filmstars
spec:
  selector:
    app: db-users
  ports:
    - port: 5432
      targetPort: 5432
---
