apiVersion: apps/v1
kind: Deployment
metadata:
  name: users-service
  namespace: filmstars
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: users-service
  template:
    metadata:
      labels:
        app: users-service
    spec:
      containers:
        - name: users-service
          image: ${ZOT_HOST}/filmstars/users-service:${TAG}
          envFrom:
            - configMapRef: { name: filmstars-common }
            - configMapRef: { name: users-config }
            - secretRef: { name: filmstars-secrets }
          ports:
            - containerPort: 3001
          readinessProbe: { tcpSocket: { port: 3001 }, initialDelaySeconds: 10, periodSeconds: 5 }
          livenessProbe: { tcpSocket: { port: 3001 }, initialDelaySeconds: 25, periodSeconds: 10 }
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits: { cpu: "500m", memory: "256Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: users-service
  namespace: filmstars
spec:
  selector:
    app: users-service
  ports:
    - port: 3001
      targetPort: 3001
---
