services:
  db-users:
    image: postgres:15-alpine
    container_name: filmstars-db-users
    environment:
      POSTGRES_DB: ${USERS_DB_NAME}
      POSTGRES_USER: ${USERS_DB_USER}
      POSTGRES_PASSWORD: ${USERS_DB_PASS}
    ports:
      - "${USERS_DB_PORT}:5432"
    volumes:
      - db_users_data:/var/lib/postgresql/data
      - ./database/sql/users/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - filmstars-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${USERS_DB_USER} -d ${USERS_DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  db-movies:
    image: postgres:15-alpine
    container_name: filmstars-db-movies
    environment:
      POSTGRES_DB: ${MOVIES_DB_NAME}
      POSTGRES_USER: ${MOVIES_DB_USER}
      POSTGRES_PASSWORD: ${MOVIES_DB_PASS}
    ports:
      - "${MOVIES_DB_PORT}:5432"
    volumes:
      - db_movies_data:/var/lib/postgresql/data
      - ./database/sql/movies/init.sql:/docker-entrypoint-initdb.d/01_init.sql
      - ./database/sql/movies/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    networks:
      - filmstars-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${MOVIES_DB_USER} -d ${MOVIES_DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  db-reservations:
    image: postgres:15-alpine
    container_name: filmstars-db-reservations
    environment:
      POSTGRES_DB: ${RESERVATIONS_DB_NAME}
      POSTGRES_USER: ${RESERVATIONS_DB_USER}
      POSTGRES_PASSWORD: ${RESERVATIONS_DB_PASS}
    ports:
      - "${RESERVATIONS_DB_PORT}:5432"
    volumes:
      - db_reservations_data:/var/lib/postgresql/data
      - ./database/sql/reservations/init.sql:/docker-entrypoint-initdb.d/01_init.sql
      - ./database/sql/reservations/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    networks:
      - filmstars-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${RESERVATIONS_DB_USER} -d ${RESERVATIONS_DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  db-payments:
    image: postgres:15-alpine
    container_name: filmstars-db-payments
    environment:
      POSTGRES_DB: ${PAYMENTS_DB_NAME}
      POSTGRES_USER: ${PAYMENTS_DB_USER}
      POSTGRES_PASSWORD: ${PAYMENTS_DB_PASS}
    ports:
      - "${PAYMENTS_DB_PORT}:5432"
    volumes:
      - db_payments_data:/var/lib/postgresql/data
      - ./database/sql/payments/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - filmstars-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PAYMENTS_DB_USER} -d ${PAYMENTS_DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management
    container_name: filmstars-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
    ports:
      - "${RABBITMQ_PORT}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT}:15672"
    networks:
      - filmstars-network
    restart: unless-stopped

  users-service:
    build:
      context: ./users-service
      dockerfile: Dockerfile
    container_name: filmstars-users-service
    environment:
      NODE_ENV: ${NODE_ENV}
      PORT: ${USERS_SERVICE_PORT}
      DB_HOST: ${USERS_DB_HOST_INTERNAL}
      DB_PORT: ${USERS_DB_PORT_INTERNAL}
      DB_NAME: ${USERS_DB_NAME}
      DB_USER: ${USERS_DB_USER}
      DB_PASS: ${USERS_DB_PASS}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      DEFAULT_ADMIN_NAME: ${DEFAULT_ADMIN_NAME}
      DEFAULT_ADMIN_EMAIL: ${DEFAULT_ADMIN_EMAIL}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD}
    ports:
      - "${USERS_SERVICE_PORT}:3001"
    depends_on:
      db-users:
        condition: service_healthy
    networks:
      - filmstars-network
    restart: unless-stopped

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: filmstars-api-gateway
    environment:
      NODE_ENV: ${NODE_ENV}
      PORT: ${API_GATEWAY_PORT}
      JWT_SECRET: ${JWT_SECRET}
      USERS_SERVICE_URL: ${USERS_SERVICE_URL_INTERNAL}
    ports:
      - "${API_GATEWAY_PORT}:8080"
    depends_on:
      - users-service
    networks:
      - filmstars-network
    restart: unless-stopped

volumes:
  db_users_data:
  db_movies_data:
  db_reservations_data:
  db_payments_data:

networks:
  filmstars-network:
    driver: bridge
