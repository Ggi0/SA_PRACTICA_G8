services:
  db-users:
    image: postgres:15-alpine
    container_name: filmstars-db-users
    environment:
      POSTGRES_DB: filmstars_users
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5433:5432"
    volumes:
      - db_users_data:/var/lib/postgresql/data
    networks:
      - filmstars-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d filmstars_users"]
      interval: 5s
      timeout: 5s
      retries: 10

  users-service:
    build:
      context: ./users-service
      dockerfile: Dockerfile
    container_name: filmstars-users-service
    environment:
      NODE_ENV: development
      PORT: 3001
      DB_HOST: db-users
      DB_PORT: 5432
      DB_NAME: filmstars_users
      DB_USER: postgres
      DB_PASS: postgres123
      JWT_SECRET: filmstars_jwt_secret_key_2026
      JWT_EXPIRES_IN: 24h
      DEFAULT_ADMIN_NAME: FilmStars Admin
      DEFAULT_ADMIN_EMAIL: admin@filmstars.com
      DEFAULT_ADMIN_PASSWORD: admin12345
    ports:
      - "3001:3001"
    depends_on:
      db-users:
        condition: service_healthy
    networks:
      - filmstars-network
    restart: unless-stopped

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: filmstars-api-gateway
    environment:
      NODE_ENV: development
      PORT: 8080
      JWT_SECRET: filmstars_jwt_secret_key_2026
      USERS_SERVICE_URL: http://users-service:3001
    ports:
      - "8080:8080"
    depends_on:
      - users-service
    networks:
      - filmstars-network
    restart: unless-stopped

volumes:
  db_users_data:

networks:
  filmstars-network:
    driver: bridge
